# 背景知識ベース (External Knowledge / Off-Data Context)
# データベース外の出来事、統計データの収集背景、社会情勢などを記述する。
# 数値を解釈する際の「外的要因」として使用する。

external_events:
  covid_19_impact:
    name: 新型コロナウイルス感染症による影響
    period: "2020年 - 2021年"
    description: >
      緊急事態宣言や外出自粛要請により、日本全体の交通量が大幅に減少した。
      特に夜間の人流抑制が顕著であり、飲酒運転や深夜の事故件数に強く影響している。
    caution: >
      2020年の事故件数が少ないのは、安全対策の効果だけでなく、
      「物理的な交通量の減少」という外的要因が極めて大きい。
      2024年（ポストコロナ）との比較では、この活動量の差を考慮する必要がある。

  law_revisions:
    aori_unten:
      name: 妨害運転罪（あおり運転）の創設
      date: "2020年6月30日"
      description: >
        道路交通法改正により、あおり運転が厳罰化された。
        これにより、警察による取り締まり強化と記録の厳格化が行われた。
    sapoca_license:
      name: サポカー限定免許の導入
      date: "2022年5月13日"
      description: >
        高齢運転者対策として、安全運転サポート車（サポカー）限定免許が開始された。
        2024年データにおけるサポカー比率の上昇には、この制度的背景も関係している。

data_collection_context:
  police_statistics_bias:
    description: >
      このデータは警察に届け出があった事故のみを集計している（警察庁「交通事故統計」）。
    limitations:
      - 軽微な物損事故や、当事者間で示談した事故は含まれない。
      - 「死亡」の定義は、事故発生から24時間以内に死亡した場合を指す（24時間死者）。
      - 30日以内死者や、その後の後遺障害は別の統計として管理されているため、このデータには現れない。

  vehicle_classification:
    description: >
      「サポカー」というラベルは、車両の型式指定や装備情報に基づいているが、
      事故当時にその機能（AEB等）が有効であったか、適切に作動したかまでは保証しない。
