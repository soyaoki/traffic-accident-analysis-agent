# ドメイン知識ベース — 交通安全統計の解釈指針
# データ定義（catalog.yaml）とは別に管理する「解釈の知識」。
# 統計的バイアス、分析方針、既知の限界点を記述する。

biases:
  residual_accident_bias:
    name: 残存事故バイアス（Residual Accident Bias）
    applies_to: サポカー vs 非サポカー の致死率比較
    description: >
      AEB（自動緊急ブレーキ）が軽微な事故を未然に防ぐため、
      統計に残るのはセンサー限界を超えた重篤事故に偏る。
      その結果、サポカーの致死率が非サポカーより高く見えることがある。
      この数値はサポカーが危険であることを示すのではなく、
      「軽微な事故が除去された後の重篤事故の比率」を反映している。
    caution: サポカー致死率を単純比較する際は必ずこの留保を付記すること。

  cross_sectional_bias:
    name: 横断面データの限界（Cross-sectional Limitation）
    applies_to: 年度間比較・因果推論全般
    description: >
      2020年と2024年は独立した断面データであり、同一車両・同一ドライバーの追跡ではない。
      「防がれた事故」は統計に現れないため、介入効果を直接測定できない。
      減少傾向が観察されても、特定要因への帰属は慎重に行うこと。
    caution: 因果関係ではなく相関関係として述べること。

analysis_guidelines:
  output_structure:
    description: 全ての分析結果は以下の3点構造で提示すること
    format:
      - "① 数値: 絶対値と変化率をセットで述べる"
      - "② 解釈: 数値が示す事象を説明する"
      - "③ 限界点: 上記バイアスや横断面データの制約を明示する"

  numeric_reporting:
    - 絶対値と変化率（%）を必ずセットで報告する
    - 件数と率（致死率など）を使い分ける

  temporal_scope:
    sapoca_analysis: >
      サポカー（サポカー名A カラム）は2024年データにのみ存在する。
      2020年との比較においてサポカー効果を論じることはデータ上不可能。
      2024年単年での横断面分析のみ行うこと。

projection:
  target_2030:
    government_goal: "2030年までに年間死者数 1,500人以下（警察庁目標）"
    method: >
      2020年→2024年の年平均減少率を算出し、指数関数的に2030年まで延長する。
      線形・指数の両方を試算し、目標との乖離を示すこと。
    caution: >
      外挿予測であるため、施策変化・自動運転普及・人口動態変化などの
      非線形要因を考慮できないことを明示すること。
