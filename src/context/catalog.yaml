# Layer 2: 人間による注釈 — 交通事故統計データカタログ
# OpenAI社内エージェント設計の6層コンテキスト設計に倣い、
# スキーマだけでは分からない「意味・分析ロジック・注意点」を記述する。

tables:
  honhyo:
    file_pattern: "data/{year}/honhyo_{year}.csv"
    encoding: shift_jis
    description: >
      交通事故本票。1行が1事故に対応。集計・分析の起点となるテーブル。
      死亡事故の分析は 死者数 > 0 でフィルタする。
      当事者Aは通常「加害者側」車両、当事者Bは「被害者側」。
      人対車両では当事者Bが歩行者になる。

    columns:
      死者数:
        type: int
        description: 事故当日の死亡者数。30日以内死者は別途補充票で管理。
        analysis_note: >
          致死率の計算式は「死者数の合計 ÷ 事故件数」。
          AEB普及世界では分母（事故件数）が減るため、単純な致死率比較は
          「AEBが効くほど見かけ上の致死率が上がる」生存者バイアスに注意。

      事故類型:
        type: int
        description: 事故の発生形態を大分類したコード
        codes:
          1:  "人対車両"   # 歩行者が当事者Bに相当するケース
          21: "車両相互"
          41: "車両単独"
          61: "列車"
        analysis_note: >
          人対車両(1)が最も致死率が高く、夜間×低速域での停滞が最大課題。
          車両単独(41)では当事者Bは「相手なし/物件」でペダル踏み間違い等を含む。

      昼夜:
        type: int
        description: 事故発生時の昼夜区分（日の出・日の入り基準）
        codes:
          11: "昼-明"   # 日の出後1時間
          12: "昼-昼"   # 通常の昼間
          13: "昼-暮"   # 日の入り前1時間
          21: "夜-暮"   # 日の入り後1時間
          22: "夜-夜"   # 通常の夜間
          23: "夜-明"   # 日の出前1時間
        night_codes: [21, 22, 23]
        analysis_note: >
          夜間(21-23)は昼間比で死亡リスクが約3倍（多変量ロジスティック回帰OR≈2.9）。
          歩行者死亡の約70%が夜間に集中。

      速度規制（指定のみ）（当事者A）:
        type: int
        description: 当事者A車両が走行していた道路の法定最高速度（公安委員会指定）
        codes:
          0:  "対象外"
          1:  "≤20km/h"
          2:  "≤30km/h"
          3:  "≤40km/h"
          4:  "≤50km/h"
          5:  "≤60km/h"
          6:  "≤70km/h"
          7:  "≤80km/h"
          8:  "≤100km/h"
          9:  ">100km/h"
          10: "規制なし等"
        speed_band:
          低速: [1, 2, 3]    # ≤40km/h  市街地・生活道路
          中速: [4, 5]        # ≤60km/h  幹線道路
          高速: [6, 7, 8, 9]  # >60km/h  郊外・高速道路
        analysis_note: >
          低速(≤40km/h)は「止まれるはず」と思われがちだが、
          40km/h走行時の全制動距離（反応0.75秒+AEB制動）は約17m。
          夜間×歩行者急横断では物理的にAEBが間に合わないシナリオが残る。

      サポカー（当事者A）:
        type: int
        description: 当事者A車両のサポカー（安全運転サポート車）装備状況
        codes:
          0:  "対象外（歩行者・自転車等）"
          1:  "サポカー"
          11: "非サポカー"
        analysis_note: >
          2024年死亡事故（四輪当事者A）の91.3%は非サポカー。
          単純比較でサポカーの致死率が高く見える逆説は残存事故バイアス：
          AEB が防いだ軽微事故は統計から消え、残存するのはセンサー限界を超えた事故のみ。
          真の効果測定にはITARDA No.133のような保有台数ベースの比較が必要。

      人身損傷程度（当事者A）:
        type: int
        description: 当事者Aの人的被害の程度
        codes:
          0: "対象外"
          1: "死亡"
          2: "負傷"
          4: "損傷なし"

      人身損傷程度（当事者B）:
        type: int
        description: 当事者Bの人的被害の程度（歩行者死亡分析の主指標）
        codes:
          0: "対象外"
          1: "死亡"
          2: "負傷"
          4: "損傷なし"
        analysis_note: >
          人対車両分析では当事者B（歩行者）の死亡(=1)に注目する。

      当事者種別（当事者A）:
        type: int
        description: 当事者Aの種別（車種・歩行者等）
        codes:
          11: "乗用車（普通・大型）"
          12: "乗用車（軽）"
          21: "貨物車（大型）"
          22: "貨物車（中型）"
          23: "貨物車（普通）"
          24: "貨物車（軽）"
          31: "特殊車"
          41: "二輪車（大型）"
          42: "二輪車（普通）"
          51: "原付"
          61: "軽車両（自転車等）"
          71: "歩行者"

      年齢（当事者A）:
        type: int
        description: 当事者Aの年齢（999=不明）
        analysis_note: 65歳以上を高齢者として定義することが多い。

      発生日時　　年:
        type: int
        description: 事故発生年（2020, 2024等）

      発生日時　　月:
        type: int
        description: 事故発生月（1-12）

      地点　緯度（北緯）:
        type: float
        description: 事故発生地点の緯度（10進数）

      地点　経度（東経）:
        type: float
        description: 事故発生地点の経度（10進数）

  hojuhyo:
    file_pattern: "data/{year}/hojuhyo_{year}.csv"
    encoding: shift_jis
    description: >
      補充票。事故に複数の当事者がいる場合、当事者C以降の情報を格納。
      honhyo.本票番号 = hojuhyo.本票番号 でJOIN。
      当事者Bの詳細属性（サポカー・損傷程度等）は補充票側に格納されることがある。

analysis_patterns:
  fatal_segmentation:
    description: 死亡負担セグメント分析
    approach: >
      事故類型 × 昼夜（昼間/夜間） × 速度帯（低速/中速/高速）でクロス集計し、
      2020→2024の件数変化率と死亡件数絶対値を可視化する。
      死亡負担が大きく（件数多い）かつ削減が進んでいない（変化率≈0またはプラス）の
      領域が「介入空白」。

  sapoca_analysis:
    description: サポカー効果の逆説分析
    approach: >
      人対車両×夜間のサブセットで、当事者A（加害車）のサポカー有無別に
      当事者B（歩行者）の死亡率を比較する。
      残存事故バイアスの説明を必ずセットで行うこと。

  projection_2030:
    description: 2030年目標達成可能性の試算
    approach: >
      2020→2024の実績トレンド（-46.5件/年）をそのまま延長した場合の
      2030年推計値を計算。目標値1,392名との差分（死のギャップ）を示す。
      「自然更新では届かない」という構造的課題を数字で示す。

known_issues:
  - >
    横断面データ（事故記録）では「AEBが防いだ事故」は観測不能。
    真のADASカバレッジ測定には走行距離・AEB作動ログとの連携が必要。
  - >
    2020年はコロナ禍の交通量減少という交絡あり。2020→2024比較には注意。
  - >
    車両年式・重量データが含まれないため、傾向スコアマッチングによる
    厳密な因果推論は本データ単独では困難。
