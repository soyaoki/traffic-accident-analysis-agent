# Layer 2: 交通事故統計データカタログ (Semantic Layer)
# 全てのデータは DuckDB の `accidents` テーブルに集約されています。

tables:
  accidents:
    description: >
      交通事故本票データ。1行が1事故に対応。
      2020年と2024年の全データがこのテーブルに含まれています。
      年を区別するには `年` カラムを使用してください。
    
    metrics:
      死亡事故件数: "SUM(CASE WHEN 死者数 > 0 THEN 1 ELSE 0 END)"
      全事故件数: "COUNT(*)"
      致死率: "(死亡事故件数 * 100.0 / 全事故件数)"

    columns:
      年:
        type: int
        description: 事故発生年（2020 または 2024）
      死者数:
        type: int
        description: 事故当日の死亡者数。死亡事故の判定（死者数 > 0）に使用。
      事故類型名:
        type: string
        description: 事故の形態（人対車両, 車両相互, 車両単独, 列車）
      昼夜名:
        type: string
        description: 昼夜区分（昼-明, 昼-昼, 昼-暮, 夜-暮, 夜-夜, 夜-明）
      夜間フラグ:
        type: boolean
        description: 夜間（夜-暮, 夜-夜, 夜-明）の場合に True
      天候名:
        type: string
        description: 天候（晴, 曇, 雨, 霧, 雪）
      地形名:
        type: string
        description: 市街地区分（市街地-DID, 市街地-その他, 非市街地）
      道路形状名:
        type: string
        description: 道路の形状（交さと点, 単路-その他, カーブ等）
      速度帯A:
        type: string
        description: 当事者Aの速度規制（低速(<=40), 中速(<=60), 高速(>60)）
      当事者種別（当事者A）:
        type: string
        description: >
          当事者Aの車両種別（普通乗用車, 軽乗用車, 原付一種, 特定小型原動機付自転車 など）。
          電動キックボードは「特定小型原動機付自転車」として2024年データに含まれます。
      サポカー名A:
        type: string
        description: 当事者Aのサポカー装備状況（サポカー, 非サポカー, データなし）
      人身損傷程度（当事者B）:
        type: int
        description: 被害者側(B)の損傷程度（1:死亡, 2:負傷, 4:損傷なし）

analysis_notes:
  survival_bias: >
    サポカーの致死率が非サポカーより高く見えるのは「残存事故バイアス」です。
    AEBが軽微な事故を未然に防ぐため、統計に残るのはセンサー限界を超えた重大事故のみになる傾向があります。
  projection_2030: >
    2030年目標（1,392名以下）への試算には、2020年と2024年の実績値から年平均減少率を算出し、線形または指数関数的に延長してください。

usage_patterns:
  description: "[Layer 1: Table Usage Metadata] 頻繁に使用されるクエリパターンと典型的な集計例。"
  examples:
    - title: "年度別の事故件数と致死率の推移"
      sql: "SELECT 年, COUNT(*) as 全件数, SUM(CASE WHEN 死者数 > 0 THEN 1 ELSE 0 END) as 死亡事故件数, (死亡事故件数 * 100.0 / 全件数) as 致死率 FROM accidents GROUP BY 年 ORDER BY 年"
    - title: "車両種別（電動キックボード等）の事故集計"
      sql: "SELECT `当事者種別（当事者A）`, COUNT(*) as 件数 FROM accidents WHERE `当事者種別（当事者A）` = '特定小型原動機付自転車' GROUP BY `当事者種別（当事者A）`"
    - title: "昼夜別の死亡事故の割合"
      sql: "SELECT 昼夜名, SUM(CASE WHEN 死者数 > 0 THEN 1 ELSE 0 END) as 死亡事故件数 FROM accidents GROUP BY 昼夜名"
